# =========================================================
# Sanaie Platform — Nginx Reverse Proxy Configuration
# Copy to: /etc/nginx/sites-available/sanaie
# Then:    ln -s /etc/nginx/sites-available/sanaie /etc/nginx/sites-enabled/
#          certbot --nginx -d api.sanaie.com
#          systemctl reload nginx
# =========================================================

# Rate limiting zone — 10 requests/second per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# ── HTTP → HTTPS redirect ──
server {
    listen 80;
    listen [::]:80;
    server_name api.sanaie.com;
    return 301 https://$host$request_uri;
}

# ── HTTPS server ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.sanaie.com;

    # ── SSL (Certbot will auto-fill these) ──
    # ssl_certificate /etc/letsencrypt/live/api.sanaie.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.sanaie.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security Headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Limits ──
    client_max_body_size 10M;

    # ── Gzip for JSON responses ──
    gzip on;
    gzip_types application/json text/plain application/javascript;
    gzip_min_length 256;

    # ── API reverse proxy ──
    location / {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ── Static uploads (served by Nginx, not Python) ──
    location /static/uploads/ {
        alias /opt/sanaie/uploaded_images/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Block access to docs in production ──
    location ~ ^/(docs|redoc|openapi.json)$ {
        deny all;
        return 404;
    }
}
